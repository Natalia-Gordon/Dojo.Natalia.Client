<div class="gallery-item" (click)="onImageClick()">
  <div class="image-container">
    <img [src]="image.src" [alt]="image.alt" class="img-fluid rounded shadow-sm gallery-image"
      (load)="onImageLoad($event)" (error)="onImageError($event)"
      style="cursor: pointer;">
      @if (!image.loaded && !image.error) {
        <div class="image-loading">
          <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">טוען...</span>
          </div>
        </div>
      }
      @if (image.error) {
        <div class="image-error">
          <i class="fas fa-exclamation-triangle text-warning"></i>
          <span>שגיאה בטעינת התמונה</span>
        </div>
      }
    </div>
    <div class="gallery-overlay">
      <div class="gallery-title">{{ image.title }}</div>
    </div>
  </div>

  <!-- Fullscreen overlay: click image opens here, Escape or backdrop closes -->
  @if (showFullscreen && selectedImage) {
    <div class="gallery-fullscreen-backdrop" (click)="closeFullscreen()" role="button" tabindex="0">
      <div class="gallery-fullscreen-content" (click)="$event.stopPropagation()">
        <button type="button" class="gallery-fullscreen-close" (click)="closeFullscreen()" aria-label="סגור">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
        <div class="gallery-fullscreen-image-wrap">
          <img [src]="selectedImage.src" [alt]="selectedImage.alt" class="gallery-fullscreen-img">
        </div>
        <p class="gallery-fullscreen-title">{{ selectedImage.title }}</p>
      </div>
    </div>
  }
